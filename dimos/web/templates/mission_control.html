<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimOS Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: #08080c;
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
            color: #c8ccd4;
        }

        /* ── Header ── */
        .header {
            height: 36px;
            background: linear-gradient(180deg, #12141c 0%, #0c0e14 100%);
            border-bottom: 1px solid #1a1d28;
            display: flex; align-items: center;
            padding: 0 16px; gap: 16px; flex-shrink: 0;
        }
        .header-logo { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #7eb8f7; }
        .header-logo span { color: #3d5a80; }
        .header-sep { width: 1px; height: 16px; background: #1e2230; }
        .header-stat { font-size: 11px; color: #5a6070; display: flex; align-items: center; gap: 6px; }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #2ecc71; box-shadow: 0 0 6px #2ecc7188;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .status-dot.off  { background: #ef4444; box-shadow: 0 0 6px #ef444488; animation: none; }
        .status-dot.warn { background: #f1c40f; box-shadow: 0 0 6px #f1c40f88; animation: none; }
        .header-clock { margin-left: auto; font-size: 11px; color: #3d4555; font-variant-numeric: tabular-nums; }

        /* ── Grid: 3 cols × 3 rows ──
           col1       col2 (Rerun)   col3
           CmdCtr     Rerun          AgentFeed  row1
           CmdCtr     Rerun          Claude     row2
           LCM        dtop           MCP        row3
        */
        .grid {
            width: 100%; height: calc(100% - 36px);
            display: grid;
            grid-template-columns: 1fr 1.8fr 1fr;
            grid-template-rows: 1.1fr 0.9fr 1fr;
            gap: 1px; background: #0a0c10;
        }
        .p-cmdcenter { grid-column: 1; grid-row: 1 / 3; }
        .p-rerun     { grid-column: 2; grid-row: 1 / 3; }
        .p-agentfeed { grid-column: 3; grid-row: 1; }
        .p-humancli  { grid-column: 3; grid-row: 2; }
        .p-lcm       { grid-column: 1; grid-row: 3; }
        .p-dtop      { grid-column: 2; grid-row: 3; }
        .p-mcp       { grid-column: 3; grid-row: 3; }

        /* ── Panel base ── */
        .panel {
            background: #0c0e14; position: relative; overflow: hidden;
            display: flex; flex-direction: column; min-height: 0;
        }
        .panel-label {
            height: 22px; flex-shrink: 0;
            background: linear-gradient(180deg, #10121a 0%, #0c0e14 100%);
            border-bottom: 1px solid #151820;
            display: flex; align-items: center; padding: 0 10px;
            font-size: 10px; font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase; color: #3d4a5c; gap: 6px;
        }
        .pdot { width: 5px; height: 5px; border-radius: 50%; }
        .pd-green  { background: #2ecc71; box-shadow: 0 0 4px #2ecc7166; }
        .pd-blue   { background: #7eb8f7; box-shadow: 0 0 4px #7eb8f766; }
        .pd-purple { background: #a78bfa; box-shadow: 0 0 4px #a78bfa66; }
        .pd-cyan   { background: #22d3ee; box-shadow: 0 0 4px #22d3ee66; }
        .pd-yellow { background: #f1c40f; box-shadow: 0 0 4px #f1c40f66; }
        .pd-green2 { background: #22c55e; box-shadow: 0 0 4px #22c55e66; }

        .panel iframe { flex: 1; width: 100%; border: none; background: #08080c; min-height: 0; display: block; }

        /* Overlay (rerun not running) */
        .panel-overlay {
            position: absolute; inset: 22px 0 0 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #2a3040; font-size: 11px; gap: 8px;
            background: #0c0e14; z-index: 20; pointer-events: none;
        }
        .panel-overlay .ov-icon { font-size: 24px; opacity: 0.3; }
        .panel-overlay .ov-hint { color: #1e2230; font-size: 10px; }
        .panel-overlay.hidden { display: none; }

        /* Generic scrollable feed */
        .feed {
            flex: 1; overflow-y: auto; min-height: 0;
            font-size: 11px; line-height: 1.5;
        }
        .feed::-webkit-scrollbar { width: 4px; }
        .feed::-webkit-scrollbar-track { background: transparent; }
        .feed::-webkit-scrollbar-thumb { background: #1e2230; border-radius: 2px; }
        .feed-empty { padding: 20px 10px; color: #1e2230; font-size: 11px; text-align: center; }

        /* ── Agent Feed entries ── */
        .agent-entry {
            padding: 3px 10px; border-bottom: 1px solid #0f1118;
            display: grid; grid-template-columns: 52px 48px 1fr;
            gap: 6px; align-items: start;
        }
        .agent-entry:hover { background: #0e1018; }
        .agent-ts { color: #2a3040; font-size: 10px; white-space: nowrap; font-variant-numeric: tabular-nums; }
        .agent-type { font-weight: 600; font-size: 10px; text-transform: uppercase; }
        .agent-type.green  { color: #2ecc71; }
        .agent-type.yellow { color: #f1c40f; }
        .agent-type.red    { color: #ef4444; }
        .agent-type.blue   { color: #7eb8f7; }
        .agent-content { color: #8090a8; word-break: break-word; }

        /* ── dtop split ── */
        .dtop-split { flex: 1; display: flex; min-height: 0; }
        .dtop-left  { width: 50%; display: flex; flex-direction: column; min-height: 0; border-right: 1px solid #0f1118; }
        .dtop-left iframe { flex: 1; width: 100%; border: none; background: #08080c; min-height: 0; display: block; zoom: 0.72; }
        .dtop-right { width: 50%; background: #0a0c10; }

        /* ── LCM Stats ── */
        .lcm-wrap { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
        .lcm-wrap::-webkit-scrollbar { width: 4px; }
        .lcm-wrap::-webkit-scrollbar-thumb { background: #1e2230; border-radius: 2px; }
        .lcm-summary { padding: 3px 10px; font-size: 10px; color: #3d4555; border-bottom: 1px solid #0f1118; flex-shrink: 0; }
        .lcm-summary span { color: #5a6a80; }
        .lcm-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .lcm-table th { position: sticky; top: 0; background: #10121a; color: #3d4a5c; text-transform: uppercase; letter-spacing: .8px; font-weight: 600; padding: 2px 8px; text-align: left; border-bottom: 1px solid #151820; }
        .lcm-table td { padding: 2px 8px; border-bottom: 1px solid #0a0c10; color: #5a6a80; }
        .lcm-table tr:hover td { background: #0e1018; }
        .td-topic { color: #8090a8; } .td-topic .rpc { color: #7eb8f7; }
        .td-freq  { color: #22d3ee; font-variant-numeric: tabular-nums; }
        .td-bw    { color: #a78bfa; font-variant-numeric: tabular-nums; }
        .td-total { color: #3d4555; font-variant-numeric: tabular-nums; }

        /* ── MCP ── */
        .mcp-wrap { flex: 1; overflow-y: auto; font-size: 10px; min-height: 0; }
        .mcp-wrap::-webkit-scrollbar { width: 4px; }
        .mcp-wrap::-webkit-scrollbar-thumb { background: #1e2230; border-radius: 2px; }
        .mcp-tool { padding: 2px 10px; border-bottom: 1px solid #0a0c10; display: flex; gap: 8px; }
        .mcp-tool-name { color: #7eb8f7; white-space: nowrap; }
        .mcp-tool-desc { color: #3d4555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dim-msg { padding: 16px 10px; color: #1e2230; font-size: 11px; text-align: center; }

        /* ── Claude Chat ── */
        .claude-wrap { flex:1; display:flex; flex-direction:column; min-height:0; }
        .claude-history { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px; min-height:0; font-size:11px; }
        .claude-history::-webkit-scrollbar { width:4px; }
        .claude-history::-webkit-scrollbar-thumb { background:#1e2230; border-radius:2px; }
        .cm-user { align-self:flex-end; max-width:90%; background:#0f1e30; border:1px solid #1a3050; border-radius:6px 6px 2px 6px; padding:4px 8px; color:#7eb8f7; word-break:break-word; }
        .cm-assistant { align-self:flex-start; max-width:95%; background:#111318; border:1px solid #1a1d28; border-radius:2px 6px 6px 6px; padding:4px 8px; color:#c0c8d4; word-break:break-word; white-space:pre-wrap; }
        .cm-tool { align-self:flex-start; color:#3d5060; font-size:10px; padding:2px 4px; border-left:2px solid #1e2230; margin-left:4px; word-break:break-word; }
        .cm-thinking { align-self:flex-start; color:#2a3545; font-size:10px; font-style:italic; }
        .cm-error { align-self:flex-start; color:#ef4444; font-size:10px; background:#1a0808; border:1px solid #3a1010; border-radius:4px; padding:3px 7px; }
        .claude-input-row { display:flex; gap:6px; padding:6px 8px; border-top:1px solid #1a1d28; background:#0f1118; flex-shrink:0; }
        .claude-input { flex:1; background:transparent; border:none; outline:none; color:#c8ccd4; font-family:inherit; font-size:11px; }
        .claude-input::placeholder { color:#2a3040; }
        .claude-input:disabled { opacity:0.4; }
        .claude-send { background:#1a1d28; border:1px solid #252830; color:#7eb8f7; padding:3px 10px; font-size:13px; border-radius:3px; cursor:pointer; font-family:inherit; flex-shrink:0; line-height:1; }
        .claude-send:hover:not(:disabled) { background:#252830; }
        .claude-send:disabled { opacity:0.4; cursor:default; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-logo">DIMOS<span> MISSION CONTROL</span></div>
        <div class="header-sep"></div>
        <div class="header-stat">
            <div class="status-dot warn" id="conn-dot"></div>
            <span id="conn-label">CONNECTING</span>
        </div>
        <div class="header-sep"></div>
        <div class="header-stat">
            <div class="status-dot off" id="lcm-dot"></div>
            <span id="lcm-label">LCM</span>
        </div>
        <div class="header-sep"></div>
        <div class="header-stat"><span id="skill-count">— skills</span></div>
        <div class="header-clock" id="clock">--:--:--</div>
    </div>

    <div class="grid">

        <!-- Command Center (col1, rows 1-2) -->
        <div class="panel p-cmdcenter">
            <div class="panel-label"><div class="pdot pd-green"></div> Command Center</div>
            <iframe src="/command-center"></iframe>
        </div>

        <!-- Rerun 3D (col2, rows 1-2) -->
        <div class="panel p-rerun" id="panel-rerun">
            <div class="panel-label"><div class="pdot pd-blue"></div> Rerun 3D</div>
            <iframe id="iframe-rerun" src="http://localhost:9090/?url=rerun%2Bhttp%3A%2F%2Flocalhost%3A9876%2Fproxy"></iframe>
            <div class="panel-overlay hidden" id="rerun-overlay">
                <div class="ov-icon">◈</div>
                <div>Rerun not running</div>
                <div class="ov-hint">Use: dimos --viewer rerun-web run &lt;blueprint&gt;</div>
            </div>
        </div>

        <!-- Agent Feed (col3, row1) — autoscroll from bottom -->
        <div class="panel p-agentfeed">
            <div class="panel-label"><div class="pdot pd-purple"></div> Agent Feed</div>
            <div class="feed" id="agent-feed">
                <div class="feed-empty" id="agent-empty">Waiting for agent messages…</div>
            </div>
        </div>

        <!-- Claude Chat (col3, row2) -->
        <div class="panel p-humancli">
            <div class="panel-label"><div class="pdot pd-purple"></div> Claude</div>
            <div class="claude-wrap">
                <div class="claude-history" id="claude-history"></div>
                <div class="claude-input-row">
                    <input class="claude-input" id="claude-input" type="text" placeholder="Talk to Claude…" autocomplete="off" />
                    <button class="claude-send" id="claude-send">↵</button>
                </div>
            </div>
        </div>

        <!-- LCM Stats (col1, row3) -->
        <div class="panel p-lcm">
            <div class="panel-label"><div class="pdot pd-cyan"></div> LCM Stats</div>
            <div class="lcm-wrap">
                <div class="lcm-summary">
                    <span id="lcm-freq">0.00</span> Hz &nbsp;·&nbsp; <span id="lcm-bw">0.00 B/s</span>
                </div>
                <table class="lcm-table">
                    <thead><tr><th>Topic</th><th>Hz</th><th>BW</th><th>Total</th></tr></thead>
                    <tbody id="lcm-tbody">
                        <tr><td colspan="4" class="dim-msg">No LCM traffic yet…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- dtop (col2, row3) — left half only, right reserved -->
        <div class="panel p-dtop">
            <div class="panel-label"><div class="pdot pd-green2"></div> dtop</div>
            <div class="dtop-split">
                <div class="dtop-left" id="panel-dtop"><!-- iframe injected --></div>
                <div class="dtop-right"><!-- reserved --></div>
            </div>
        </div>

        <!-- MCP Server (col3, row3) -->
        <div class="panel p-mcp">
            <div class="panel-label"><div class="pdot pd-yellow"></div> MCP — Skills</div>
            <div class="mcp-wrap" id="mcp-wrap">
                <div class="dim-msg">Connecting to MCP…</div>
            </div>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
    (function () {

        // ── Clock ──
        function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {hour12:false}); }
        setInterval(tick, 1000); tick();

        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        // ── SocketIO ──
        const connDot   = document.getElementById('conn-dot');
        const connLabel = document.getElementById('conn-label');
        function setConn(s) {
            connDot.classList.remove('off','warn');
            if (s === 'connected')    { connLabel.textContent = 'CONNECTED'; }
            else if (s === 'connecting') { connDot.classList.add('warn'); connLabel.textContent = 'CONNECTING'; }
            else { connDot.classList.add('off'); connLabel.textContent = 'DISCONNECTED'; }
        }
        const socket = io({transports:['websocket','polling'], reconnection:true, reconnectionDelay:2000});
        socket.on('connect',       () => setConn('connected'));
        socket.on('disconnect',    () => setConn('disconnected'));
        socket.on('connect_error', () => setConn('connecting'));

        // ── Rerun: check after 5s if port 9090 is alive ──
        setTimeout(async () => {
            try { await fetch('http://localhost:9090', {mode:'no-cors', signal:AbortSignal.timeout(2000)}); }
            catch { document.getElementById('rerun-overlay').classList.remove('hidden'); }
        }, 5000);

        // ── Agent Feed — append at bottom, autoscroll ──
        const agentFeed = document.getElementById('agent-feed');
        const MAX_AGENT = 300;
        let agentUserScrolled = false;

        agentFeed.addEventListener('scroll', () => {
            agentUserScrolled = agentFeed.scrollHeight - agentFeed.scrollTop - agentFeed.clientHeight > 60;
        });

        socket.on('agent_message', (data) => {
            const empty = document.getElementById('agent-empty');
            if (empty) empty.remove();

            const e = document.createElement('div');
            e.className = 'agent-entry';
            const cls = data.style || 'yellow';
            e.innerHTML =
                `<span class="agent-ts">${esc(data.timestamp_str||'')}</span>` +
                `<span class="agent-type ${cls}">${esc(data.type||'')}</span>` +
                `<span class="agent-content">${esc(data.content||'')}</span>`;
            agentFeed.appendChild(e);
            while (agentFeed.children.length > MAX_AGENT) agentFeed.removeChild(agentFeed.firstChild);
            if (!agentUserScrolled) agentFeed.scrollTop = agentFeed.scrollHeight;
        });

        // ── Embed dtop via /api/services polling ──
        function embedIframe(panel, url) {
            if (panel.querySelector('iframe')) return;
            const existing = panel.querySelector('.panel-overlay');
            if (existing) existing.remove();
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.style.cssText = 'flex:1;width:100%;border:none;background:#08080c;min-height:0;display:block;';
            panel.appendChild(iframe);
        }

        function showPanelError(panel, url) {
            if (panel.querySelector('iframe') || panel.querySelector('.panel-overlay')) return;
            const d = document.createElement('div');
            d.className = 'panel-overlay';
            d.innerHTML = `<div class="ov-icon">⊘</div><div>Not running</div><div class="ov-hint">${url}</div>`;
            panel.appendChild(d);
        }

        const embedded = new Set();
        async function pollServices() {
            try {
                const r = await fetch('/api/services', {signal: AbortSignal.timeout(3000)});
                const svc = await r.json();
                const info = svc.dtop;
                if (!info || embedded.has('dtop')) return;
                const panel = document.getElementById('panel-dtop');
                if (!panel) return;
                if (info.alive) { embedded.add('dtop'); embedIframe(panel, info.url); }
                else showPanelError(panel, info.url);
            } catch {}
        }
        setTimeout(pollServices, 2000);
        setInterval(pollServices, 5000);

        // ── Claude Chat ──
        const claudeHistory = document.getElementById('claude-history');
        const claudeInput   = document.getElementById('claude-input');
        const claudeSend    = document.getElementById('claude-send');
        let conversationHistory = [];

        function addMsg(text, cls) {
            const d = document.createElement('div');
            d.className = cls;
            d.textContent = text;
            claudeHistory.appendChild(d);
            claudeHistory.scrollTop = claudeHistory.scrollHeight;
            return d;
        }

        async function sendClaudeMsg() {
            const msg = claudeInput.value.trim();
            if (!msg) return;
            claudeInput.value = '';
            claudeInput.disabled = true;
            claudeSend.disabled = true;

            addMsg(msg, 'cm-user');
            conversationHistory.push({role:'user', content: msg});

            const thinking = addMsg('thinking…', 'cm-thinking');
            try {
                const r = await fetch('/api/chat', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({message: msg, history: conversationHistory.slice(0,-1)}),
                    signal: AbortSignal.timeout(120000)
                });
                const d = await r.json();
                thinking.remove();
                if (d.error) {
                    addMsg('Error: ' + d.error, 'cm-error');
                } else {
                    // Show tool calls
                    (d.tool_calls||[]).forEach(tc => {
                        addMsg(`⚙ ${tc.name}(${JSON.stringify(tc.input)}) → ${JSON.stringify(tc.result).slice(0,120)}`, 'cm-tool');
                    });
                    if (d.response) {
                        addMsg(d.response, 'cm-assistant');
                        conversationHistory.push({role:'assistant', content: d.response});
                    }
                }
            } catch(e) {
                thinking.remove();
                addMsg('Error: request failed or timed out', 'cm-error');
            } finally {
                claudeInput.disabled = false;
                claudeSend.disabled = false;
                claudeInput.focus();
            }
        }

        claudeSend.addEventListener('click', sendClaudeMsg);
        claudeInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendClaudeMsg(); } });

        // ── LCM Stats ──
        const lcmDot   = document.getElementById('lcm-dot');
        const lcmLabel = document.getElementById('lcm-label');
        socket.on('lcm_stats', (data) => {
            const active = data.total && data.total.freq > 0;
            lcmDot.classList.toggle('off', !active);
            lcmLabel.textContent = active ? `LCM ${data.total.freq.toFixed(1)} Hz` : 'LCM';
            if (data.total) {
                document.getElementById('lcm-freq').textContent = (data.total.freq||0).toFixed(2);
                const k = data.total.kbps||0;
                document.getElementById('lcm-bw').textContent =
                    k>=1024?(k/1024).toFixed(1)+' MB/s':k>=1?k.toFixed(1)+' kB/s':(k*1000).toFixed(0)+' B/s';
            }
            const tbody = document.getElementById('lcm-tbody');
            if (!data.topics||!data.topics.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="dim-msg">No LCM traffic…</td></tr>';
                return;
            }
            tbody.innerHTML = data.topics.map(t => {
                const n = t.name.startsWith('/rpc')
                    ? `<span class="rpc">/rpc</span>${esc(t.name.slice(4))}`
                    : esc(t.name);
                return `<tr><td class="td-topic">${n}</td><td class="td-freq">${t.freq.toFixed(1)}</td><td class="td-bw">${t.kbps_hr}</td><td class="td-total">${t.total_hr}</td></tr>`;
            }).join('');
        });

        // ── MCP Skills ──
        async function fetchMcp() {
            const wrap = document.getElementById('mcp-wrap');
            try {
                const r = await fetch('http://localhost:9990/mcp', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({jsonrpc:'2.0',id:1,method:'tools/list',params:{}}),
                    signal: AbortSignal.timeout(3000)
                });
                const d = await r.json();
                const tools = d.result?.tools||[];
                document.getElementById('skill-count').textContent = tools.length+' skills';
                wrap.innerHTML = tools.length
                    ? tools.map(t=>`<div class="mcp-tool"><span class="mcp-tool-name">${esc(t.name)}</span><span class="mcp-tool-desc">${esc(t.description||'')}</span></div>`).join('')
                    : '<div class="dim-msg">No skills registered</div>';
            } catch {
                document.getElementById('skill-count').textContent = '— skills';
                wrap.innerHTML = '<div class="dim-msg">MCP not running on :9990</div>';
            }
        }
        fetchMcp();
        setInterval(fetchMcp, 15000);

    })();
    </script>
</body>
</html>
